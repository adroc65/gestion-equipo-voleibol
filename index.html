<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d47a1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GestiónEquipo">
<link rel="manifest" href="manifest.json">
<title>Gestión Equipo Voleibol</title>
<style>
:root{
  --bg:#0b1622; --panel:#13243a; --panel2:#1b3354;
  --line:#274260; --txt:#eaf2ff; --muted:#9fb6d4;
  --azul:#1565c0; --azulc:#1e88e5; --verde:#2e7d32; --rojo:#c62828;
  --amar:#f9a825; --naranja:#ef6c00;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
.oculto{display:none !important;}
button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;color:#fff;font-weight:700;}
h1,h2,h3{margin:0;}
.pantalla{max-width:560px;margin:0 auto;padding:14px;}
.pantalla h1{font-size:20px;text-align:center;margin-bottom:4px;}
p.sub{color:var(--muted);text-align:center;margin:0 0 14px;font-size:13px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;}
.card h2{font-size:15px;margin-bottom:10px;color:var(--azulc);}
label{display:block;font-size:13px;color:var(--muted);margin:8px 0 4px;}
input,select,textarea{width:100%;padding:11px;border-radius:9px;border:1px solid var(--line);background:#0c1a2c;color:var(--txt);font-size:15px;font-family:inherit;}
textarea{resize:vertical;min-height:60px;}
.fila{display:flex;gap:8px;}
.fila>*{flex:1;}
.btnBig{background:var(--verde);padding:15px;width:100%;font-size:17px;margin-top:6px;}
.btnSec{background:var(--azul);}
.btnBack{background:#3a4f6a;padding:13px;width:100%;font-size:15px;margin-top:6px;}

/* ── Selector de equipos ── */
.equipoCard{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);}
.equipoCard:last-child{border-bottom:none;}
.equipoCard .eqNom{flex:1;font-size:15px;font-weight:600;}
.equipoCard .eqSub{font-size:12px;color:var(--muted);}
.eqBtns{display:flex;gap:6px;}
.eqBtns button{padding:8px 11px;font-size:16px;border-radius:9px;}
.bEdit{background:var(--panel2);border:1px solid var(--line);color:var(--txt);}
.bAsis{background:var(--verde);}
.bHist{background:var(--azulc);}
.bDel{background:var(--rojo);}

/* ── Editor de plantilla ── */
.jugRow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer;}
.jugRow:last-child{border-bottom:none;}
.jugAvatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--line);flex-shrink:0;}
.jugInfo{flex:1;min-width:0;}
.jugInfo .jNom{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jugInfo .jSub{font-size:12px;color:var(--muted);}
.rolBadge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--azul);color:#fff;flex-shrink:0;}
.btnDel{background:transparent;color:var(--rojo);font-size:20px;padding:4px 8px;}

/* ── Ficha jugadora ── */
#fichaFotoWrap{text-align:center;margin-bottom:14px;}
#fichaFoto{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid var(--azulc);cursor:pointer;}
#fichaFotoHint{font-size:12px;color:var(--muted);margin-top:4px;}
.fichaGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fichaGrid .full{grid-column:1/3;}
.histJug{margin-top:8px;}
.histJugRow{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;}
.histJugRow:last-child{border-bottom:none;}
.histJugRow .hFecha{flex:1;color:var(--muted);}
.presente{color:#69f0ae;font-weight:700;}
.ausente{color:#ff8a80;font-weight:700;}

/* ── Nueva sesión / ver sesión ── */
.sesRow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.sesRow:last-child{border-bottom:none;}
.sesRow .sAvatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--line);flex-shrink:0;}
.sesRow .sInfo{flex:1;}
.sesRow .sNom{font-size:14px;font-weight:600;}
.sesRow .sSub{font-size:12px;color:var(--muted);}
.chkWrap{width:36px;height:36px;flex-shrink:0;}
.chkWrap input[type=checkbox]{width:36px;height:36px;accent-color:var(--verde);cursor:pointer;}
.verPres{color:#69f0ae;font-size:18px;}
.verAus{color:var(--rojo);font-size:18px;}

/* ── Historial de sesiones ── */
.histSesRow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer;}
.histSesRow:last-child{border-bottom:none;}
.histSesRow .hDate{font-size:15px;font-weight:700;flex:1;}
.histSesRow .hCnt{font-size:13px;color:var(--muted);}
.histSesRow .hArr{color:var(--muted);font-size:18px;}

/* ── Toast ── */
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#000d;padding:11px 18px;border-radius:20px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}
dialog{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:14px;padding:18px;max-width:90vw;}
dialog::backdrop{background:#0009;}
.dlgBtn{width:100%;padding:13px;margin-top:8px;font-size:15px;}

/* ── Impresión ── */
@media print{
  body{background:#fff;color:#000;}
  .no-print,.btnBig,.btnBack,.bEdit,.bAsis,.bHist,.bDel,.btnDel,#btnGuardarSesion,#btnExportarSesion{display:none!important;}
  .card{border:1px solid #ccc;border-radius:0;margin-bottom:8px;}
  .pantalla{max-width:none;padding:0;}
  .sesRow{padding:5px 0;}
  .sAvatar{width:32px!important;height:32px!important;}
  .verPres,.verAus{font-size:14px;}
  h1{font-size:16px;}
  .print-header{display:block!important;font-size:13px;color:#555;margin-bottom:8px;}
}
.print-header{display:none;}
</style>
</head>
<body>

<!-- 1) SELECTOR DE EQUIPOS -->
<div id="sel" class="pantalla">
  <h1>🏐 Gestión Equipo Voleibol</h1>
  <p class="sub">Selecciona un equipo</p>
  <div class="card"><h2>Mis equipos</h2><div id="listaEquipos"></div></div>
  <button class="btnBig btnSec" id="btnNuevoEquipo">➕ Nuevo equipo</button>
</div>

<!-- 2) EDITOR DE PLANTILLA -->
<div id="editor" class="pantalla oculto">
  <h1 id="editorTitulo">Equipo</h1>
  <div class="card">
    <label>Nombre del equipo</label>
    <input id="edNombre" maxlength="30" placeholder="Ej: Águilas Sub-18">
  </div>
  <div class="card">
    <h2>Jugadoras <span style="color:var(--muted);font-weight:400;font-size:13px">· toca para editar</span></h2>
    <div id="edListaJug"></div>
    <button class="btnSec" style="width:100%;padding:11px;margin-top:10px" id="btnAddJug">+ Añadir jugadora</button>
  </div>
  <div class="fila no-print">
    <button class="btnSec" style="padding:11px" id="btnImportTxt">⬆ Importar TXT (stats)</button>
    <button class="btnSec" style="padding:11px" id="btnExportEquipo">⬇ Exportar JSON</button>
  </div>
  <button class="btnSec no-print" style="width:100%;padding:11px;margin-top:6px;background:var(--naranja)" id="btnExportStats">⬇ Exportar TXT para Estadísticas</button>
  <input type="file" id="importFile" accept=".txt,.json" style="display:none">
  <button class="btnBig" id="btnGuardarEquipo">💾 Guardar equipo</button>
  <button class="btnBack" id="btnBackEditor">← Volver</button>
</div>

<!-- 3) FICHA JUGADORA -->
<div id="ficha" class="pantalla oculto">
  <h1 id="fichaTitulo">Jugadora</h1>
  <div id="fichaFotoWrap">
    <img id="fichaFoto" src="" alt="Foto">
    <div id="fichaFotoHint">Toca la foto para cambiarla</div>
  </div>
  <input type="file" id="fichaFotoFile" accept="image/*" style="display:none">
  <div class="card">
    <h2>Datos del partido</h2>
    <div class="fichaGrid">
      <div><label>Número</label><input id="fNum" inputmode="numeric" maxlength="3"></div>
      <div><label>Rol</label><select id="fRol"></select></div>
      <div class="full"><label>Nombre completo</label><input id="fNom" maxlength="40"></div>
    </div>
  </div>
  <div class="card">
    <h2>Datos personales</h2>
    <div class="fichaGrid">
      <div class="full"><label>Cédula / ID</label><input id="fId" inputmode="numeric" maxlength="20"></div>
      <div><label>Fecha nacimiento</label><input id="fFechaNac" type="date"></div>
      <div><label>Peso (kg)</label><input id="fPeso" inputmode="decimal" maxlength="5"></div>
      <div><label>Altura (cm)</label><input id="fAltura" inputmode="decimal" maxlength="5"></div>
      <div class="full"><label>Nombre padre/madre</label><input id="fPadres" maxlength="60"></div>
      <div class="full"><label>Teléfono de contacto</label><input id="fTel" inputmode="tel" maxlength="20"></div>
      <div class="full"><label>Notas</label><textarea id="fNotas" rows="2"></textarea></div>
    </div>
  </div>
  <div class="card" id="fichaHistCard">
    <h2>Historial de asistencia</h2>
    <div id="fichaHist"></div>
  </div>
  <button class="btnBig" id="btnGuardarFicha">💾 Guardar</button>
  <button class="btnBack" id="btnBackFicha">← Volver a la plantilla</button>
</div>

<!-- 4) NUEVA SESIÓN DE ASISTENCIA -->
<div id="sesion" class="pantalla oculto">
  <h1>✓ Pasar Lista</h1>
  <div class="print-header" id="sesionPrintHeader"></div>
  <div class="card no-print">
    <div class="fila">
      <div><label>Fecha</label><input id="sesFecha" type="date"></div>
      <div><label>Hora</label><input id="sesHora" type="time"></div>
    </div>
    <label>Nota (opcional)</label>
    <input id="sesNota" maxlength="60" placeholder="Ej: Entrenamiento de recepción">
  </div>
  <div class="card">
    <h2 id="sesEquipoNom">Lista</h2>
    <div id="sesLista"></div>
  </div>
  <div class="fila no-print">
    <button class="btnSec" style="padding:13px" id="btnTodasPresentes">✓ Todas</button>
    <button class="btnSec" style="padding:13px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)" id="btnNingunaPresente">✗ Ninguna</button>
  </div>
  <button class="btnBig" id="btnGuardarSesion">💾 Guardar asistencia</button>
  <button class="btnSec" style="width:100%;padding:13px;margin-top:6px;background:var(--naranja)" id="btnImprimirSesion" onclick="window.print()">🖨 Imprimir / PDF</button>
  <button class="btnBack" id="btnBackSesion">← Volver</button>
</div>

<!-- 5) HISTORIAL DE SESIONES -->
<div id="historial" class="pantalla oculto">
  <h1 id="histTitulo">Historial</h1>
  <p class="sub" id="histSub"></p>
  <div class="card">
    <div id="histLista"></div>
  </div>
  <button class="btnBig btnSec" id="btnNuevaSesionHist">+ Nueva sesión</button>
  <button class="btnBack" id="btnBackHistorial">← Volver</button>
</div>

<!-- 6) VER SESIÓN -->
<div id="verSesion" class="pantalla oculto">
  <h1 id="verSesionTit">Sesión</h1>
  <p class="sub print-header" id="verSesionSub"></p>
  <div class="card">
    <div id="verSesionLista"></div>
  </div>
  <button class="btnSec" style="width:100%;padding:13px;background:var(--naranja)" onclick="window.print()">🖨 Imprimir / PDF</button>
  <button class="btnBack" id="btnBackVerSesion">← Volver al historial</button>
</div>

<div class="toast" id="toast"></div>
<dialog id="dlgConfirm">
  <p id="confMsg" style="margin:0 0 12px;font-size:15px"></p>
  <button class="dlgBtn" id="confSi" style="background:var(--rojo)">Sí, eliminar</button>
  <button class="dlgBtn" id="confNo" style="background:#3a4f6a;margin-top:4px">Cancelar</button>
</dialog>

<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const LS_KEY="gestion_equipos_v1";
const ROLES={COL:"Colocadora",PUN:"Punta",LIB:"Líbero",OPU:"Opuesta",DEF:"Defensa",CEN:"Central","?":"Sin definir"};
const AVATAR=`data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231b3354'/%3E%3Ccircle cx='50' cy='36' r='22' fill='%234a6a8a'/%3E%3Cellipse cx='50' cy='95' rx='34' ry='26' fill='%234a6a8a'/%3E%3C/svg%3E`;

let equipoActual=null, jugadoraActual=null, sesionEquipo=null, jugadorasActuales=[];

/* ── Storage ── */
const cargar=()=>{ try{return JSON.parse(localStorage.getItem(LS_KEY))||{};}catch(e){return{};} };
const guardar=obj=>localStorage.setItem(LS_KEY,JSON.stringify(obj));

/* ── Navegación ── */
const PANTALLAS=["sel","editor","ficha","sesion","historial","verSesion"];
function mostrar(id){ PANTALLAS.forEach(p=>$("#"+p).classList.toggle("oculto",p!==id)); }

/* ── Toast ── */
let _toastT;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove("show"),2400); }

/* ── Confirmar ── */
function confirmar(msg){ return new Promise(res=>{
  $("#confMsg").textContent=msg; const d=$("#dlgConfirm");
  const fin=v=>{d.close();$("#confSi").onclick=$("#confNo").onclick=null;res(v);};
  $("#confSi").onclick=()=>fin(true); $("#confNo").onclick=()=>fin(false); d.showModal();
});}

/* ── Roles ── */
function opcionesRol(sel="?"){
  return Object.entries(ROLES).map(([k,v])=>`<option value="${k}"${k===sel?" selected":""}>${k} · ${v}</option>`).join("");
}

/* ── Foto resize ── */
function resizarFoto(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image(); img.onload=()=>{
    const MAX=220, w0=img.width, h0=img.height;
    let w=w0,h=h0;
    if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
    const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
    cv.getContext("2d").drawImage(img,0,0,w,h);
    cb(cv.toDataURL("image/jpeg",0.72));
  }; img.src=e.target.result; };
  reader.readAsDataURL(file);
}

/* ══════════════════════════════════════════
   1) SELECTOR
══════════════════════════════════════════ */
function renderSelector(){
  const eq=cargar(), cont=$("#listaEquipos"); cont.innerHTML="";
  const noms=Object.keys(eq);
  if(!noms.length){ cont.innerHTML='<p class="sub" style="margin:0">Aún no hay equipos. Crea el primero abajo.</p>'; return; }
  noms.forEach(nom=>{
    const e=eq[nom];
    const div=document.createElement("div"); div.className="equipoCard";
    const info=document.createElement("div"); info.style.flex="1";
    info.innerHTML=`<div class="eqNom">${nom}</div><div class="eqSub">${e.jugadoras.length} jugadoras · ${e.sesiones.length} sesiones</div>`;
    const btns=document.createElement("div"); btns.className="eqBtns";
    const bE=document.createElement("button"); bE.className="bEdit"; bE.title="Editar plantilla"; bE.textContent="✏"; bE.onclick=()=>abrirEditor(nom);
    const bA=document.createElement("button"); bA.className="bAsis"; bA.title="Nueva asistencia"; bA.textContent="✓"; bA.onclick=()=>abrirSesion(nom);
    const bH=document.createElement("button"); bH.className="bHist"; bH.title="Historial"; bH.textContent="📅"; bH.onclick=()=>abrirHistorial(nom);
    const bD=document.createElement("button"); bD.className="bDel"; bD.title="Borrar equipo"; bD.textContent="🗑";
    bD.onclick=async()=>{ if(!await confirmar(`¿Borrar el equipo "${nom}" y todos sus datos?`)) return;
      const eq2=cargar(); delete eq2[nom]; guardar(eq2); renderSelector(); };
    btns.append(bE,bA,bH,bD); div.append(info,btns); cont.appendChild(div);
  });
}

/* ══════════════════════════════════════════
   2) EDITOR DE PLANTILLA
══════════════════════════════════════════ */
function abrirEditor(nombre){
  equipoActual=nombre||null;
  const eq=nombre?cargar()[nombre]:null;
  $("#editorTitulo").textContent=nombre?`Equipo: ${nombre}`:"Nuevo equipo";
  $("#edNombre").value=eq?eq.nombre:"";
  renderEditorJug(eq?eq.jugadoras:[]);
  mostrar("editor");
}
function renderEditorJug(jugs){
  jugadorasActuales=jugs;
  const cont=$("#edListaJug"); cont.innerHTML="";
  if(!jugs.length){ cont.innerHTML='<p class="sub" style="margin:0 0 4px">Sin jugadoras aún</p>'; return; }
  jugs.forEach(j=>{
    const div=document.createElement("div"); div.className="jugRow";
    div.innerHTML=`<img class="jugAvatar" src="${j.foto||AVATAR}" alt="">
      <div class="jugInfo"><div class="jNom">${j.nom||"(sin nombre)"}</div><div class="jSub">Nº ${j.num||"—"} · ${j.id?"ID "+j.id:""}</div></div>
      <span class="rolBadge">${j.rol||"?"}</span>`;
    div.onclick=()=>abrirFicha(j.num);
    cont.appendChild(div);
  });
}
function jugadorasDeEditor(){
  const eq=cargar(); return (equipoActual&&eq[equipoActual])?eq[equipoActual].jugadoras:[];
}
function guardarEditor(){
  const nombre=$("#edNombre").value.trim();
  if(!nombre){ toast("Ponle nombre al equipo"); $("#edNombre").focus(); return; }
  const eq=cargar();
  const prev=equipoActual&&eq[equipoActual]?eq[equipoActual]:{jugadoras:[],sesiones:[]};
  if(equipoActual&&equipoActual!==nombre) delete eq[equipoActual];
  eq[nombre]={nombre, jugadoras:jugadorasActuales.length?jugadorasActuales:prev.jugadoras, sesiones:prev.sesiones};
  guardar(eq); equipoActual=nombre;
  $("#editorTitulo").textContent=`Equipo: ${nombre}`;
  toast("Equipo guardado"); renderSelector();
}
function importarTxt(file){
  const reader=new FileReader();
  reader.onload=e=>{ try{
    const data=JSON.parse(e.target.result);
    if(!Array.isArray(data.jugadoras)) throw new Error();
    const nom=$("#edNombre").value.trim()||data.nombre||"";
    if(nom) $("#edNombre").value=nom;
    const eq=cargar(); const prev=equipoActual&&eq[equipoActual]?eq[equipoActual]:{jugadoras:[],sesiones:[]};
    const nuevas=data.jugadoras.map(j=>{
      const existe=prev.jugadoras.find(x=>String(x.num)===String(j.num));
      return existe?{...existe,nom:j.nom,rol:j.rol||"?"}:{num:j.num,nom:j.nom,rol:j.rol||"?",id:"",fechaNac:"",peso:"",altura:"",padres:"",telefono:"",notas:"",foto:null};
    });
    prev.jugadoras=nuevas; if(equipoActual) eq[equipoActual]=prev; guardar(eq);
    renderEditorJug(nuevas); toast("Importado · revisa y guarda");
  }catch(e){ toast("Error al leer el archivo"); } };
  reader.readAsText(file);
}
function exportarParaStats(){
  const nombre=$("#edNombre").value.trim()||equipoActual||"equipo";
  const jugs=jugadorasActuales.length?jugadorasActuales:(equipoActual?cargar()[equipoActual]?.jugadoras||[]:[]);
  const data={nombre, jugadoras:jugs.map(j=>({num:j.num, nom:j.nom, rol:j.rol||"?"}))};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"text/plain"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`equipo_${nombre.replace(/\W+/g,"_")}.txt`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
function exportarEquipoJSON(){
  const eq=cargar(); const nombre=$("#edNombre").value.trim()||equipoActual||"equipo";
  const data=equipoActual&&eq[equipoActual]?eq[equipoActual]:{nombre,jugadoras:[],sesiones:[]};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`equipo_${nombre.replace(/\W+/g,"_")}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}

/* ══════════════════════════════════════════
   3) FICHA JUGADORA
══════════════════════════════════════════ */
function abrirFicha(num){
  jugadoraActual=num||null;
  const eq=cargar(), e=equipoActual&&eq[equipoActual];
  const j=num&&e?e.jugadoras.find(x=>String(x.num)===String(num)):null;
  const esNueva=!j;
  $("#fichaTitulo").textContent=esNueva?"Nueva jugadora":`Nº ${j.num} · ${j.nom||""}`;
  $("#fichaFoto").src=j&&j.foto?j.foto:AVATAR;
  $("#fNum").value=j?j.num:"";
  $("#fRol").innerHTML=opcionesRol(j?j.rol:"?");
  $("#fNom").value=j?j.nom:"";
  $("#fId").value=j?j.id:"";
  $("#fFechaNac").value=j?j.fechaNac:"";
  $("#fPeso").value=j?j.peso:"";
  $("#fAltura").value=j?j.altura:"";
  $("#fPadres").value=j?j.padres:"";
  $("#fTel").value=j?j.telefono:"";
  $("#fNotas").value=j?j.notas:"";
  // Historial personal
  const histCont=$("#fichaHist");
  if(e&&j&&e.sesiones.length){
    const sesOrd=[...e.sesiones].sort((a,b)=>b.id-a.id);
    histCont.innerHTML="";
    sesOrd.forEach(ses=>{
      const pres=ses.presentes.includes(String(j.num));
      const row=document.createElement("div"); row.className="histJugRow";
      row.innerHTML=`<span class="hFecha">${formatFecha(ses.fecha)} ${ses.hora||""}</span>
        <span class="${pres?"presente":"ausente"}">${pres?"✓ Presente":"✗ Ausente"}</span>`;
      histCont.appendChild(row);
    });
  } else histCont.innerHTML='<p class="sub" style="margin:0">Sin sesiones registradas</p>';
  mostrar("ficha");
}
function guardarFicha(){
  const num=$("#fNum").value.trim();
  if(!num){ toast("El número es obligatorio"); $("#fNum").focus(); return; }
  const nom=$("#fNom").value.trim();
  if(!nom){ toast("El nombre es obligatorio"); $("#fNom").focus(); return; }
  const jNueva={
    num, nom, rol:$("#fRol").value, id:$("#fId").value.trim(),
    fechaNac:$("#fFechaNac").value, peso:$("#fPeso").value.trim(),
    altura:$("#fAltura").value.trim(), padres:$("#fPadres").value.trim(),
    telefono:$("#fTel").value.trim(), notas:$("#fNotas").value.trim(),
    foto:$("#fichaFoto").src===AVATAR?null:$("#fichaFoto").src
  };
  const eq=cargar(); if(!eq[equipoActual]){toast("Guarda el equipo primero");return;}
  const jugs=eq[equipoActual].jugadoras;
  const idx=jugadoraActual!=null?jugs.findIndex(x=>String(x.num)===String(jugadoraActual)):-1;
  if(idx>=0) jugs[idx]=jNueva; else jugs.push(jNueva);
  guardar(eq); jugadoraActual=num;
  renderEditorJug(eq[equipoActual].jugadoras);
  toast("Jugadora guardada"); mostrar("editor");
}
async function eliminarJugadora(){
  const num=jugadoraActual; if(!num) return;
  const eq=cargar(); if(!eq[equipoActual]) return;
  const j=eq[equipoActual].jugadoras.find(x=>String(x.num)===String(num));
  if(!await confirmar(`¿Eliminar a ${j?j.nom:"la jugadora"} del equipo?`)) return;
  eq[equipoActual].jugadoras=eq[equipoActual].jugadoras.filter(x=>String(x.num)!==String(num));
  guardar(eq); renderEditorJug(eq[equipoActual].jugadoras); toast("Jugadora eliminada"); mostrar("editor");
}

/* ══════════════════════════════════════════
   4) NUEVA SESIÓN DE ASISTENCIA
══════════════════════════════════════════ */
function abrirSesion(nom){
  sesionEquipo=nom;
  const hoy=new Date(), pad=n=>String(n).padStart(2,"0");
  $("#sesFecha").value=`${hoy.getFullYear()}-${pad(hoy.getMonth()+1)}-${pad(hoy.getDate())}`;
  $("#sesHora").value=`${pad(hoy.getHours())}:${pad(hoy.getMinutes())}`;
  $("#sesNota").value="";
  $("#sesEquipoNom").textContent=nom;
  renderSesLista(nom,new Set());
  mostrar("sesion");
}
function renderSesLista(nom,presentes){
  const eq=cargar(), e=eq[nom], cont=$("#sesLista"); cont.innerHTML="";
  if(!e||!e.jugadoras.length){ cont.innerHTML='<p class="sub">Sin jugadoras en la plantilla</p>'; return; }
  [...e.jugadoras].sort((a,b)=>(+a.num)-(+b.num)).forEach(j=>{
    const row=document.createElement("div"); row.className="sesRow";
    const chkId="chk_"+j.num;
    row.innerHTML=`<img class="sAvatar" src="${j.foto||AVATAR}" alt="">
      <div class="sInfo"><div class="sNom">Nº ${j.num} · ${j.nom||""}</div><div class="sSub">${ROLES[j.rol]||j.rol||""}</div></div>
      <div class="chkWrap"><input type="checkbox" id="${chkId}" ${presentes.has(String(j.num))?"checked":""}></div>`;
    cont.appendChild(row);
  });
  // Actualizar print header
  const f=$("#sesFecha").value, h=$("#sesHora").value;
  $("#sesionPrintHeader").textContent=`${nom} · ${formatFecha(f)} ${h}`;
}
function guardarSesion(){
  const fecha=$("#sesFecha").value, hora=$("#sesHora").value;
  if(!fecha){ toast("Selecciona la fecha"); return; }
  const presentes=$$('#sesLista input[type=checkbox]').filter(c=>c.checked).map(c=>c.id.replace("chk_",""));
  const eq=cargar(); if(!eq[sesionEquipo]){toast("Error: equipo no encontrado");return;}
  const ses={id:Date.now(), fecha, hora, nota:$("#sesNota").value.trim(), presentes};
  eq[sesionEquipo].sesiones.push(ses); guardar(eq);
  toast(`Asistencia guardada · ${presentes.length} presentes`);
  renderSelector(); mostrar("sel");
}

/* ══════════════════════════════════════════
   5) HISTORIAL DE SESIONES
══════════════════════════════════════════ */
function abrirHistorial(nom){
  sesionEquipo=nom;
  const eq=cargar(), e=eq[nom];
  $("#histTitulo").textContent=nom;
  $("#histSub").textContent=`${e?e.sesiones.length:0} sesiones registradas`;
  const cont=$("#histLista"); cont.innerHTML="";
  if(!e||!e.sesiones.length){ cont.innerHTML='<p class="sub" style="margin:0">Sin sesiones aún</p>'; mostrar("historial"); return; }
  const ord=[...e.sesiones].sort((a,b)=>b.id-a.id);
  ord.forEach(ses=>{
    const total=e.jugadoras.length, pres=ses.presentes.length;
    const row=document.createElement("div"); row.className="histSesRow";
    row.innerHTML=`<div style="flex:1">
      <div class="hDate">${formatFecha(ses.fecha)} ${ses.hora||""}</div>
      ${ses.nota?`<div style="font-size:12px;color:var(--muted)">${ses.nota}</div>`:""}
    </div>
    <div class="hCnt">${pres}/${total} presentes</div>
    <div class="hArr">›</div>`;
    row.onclick=()=>abrirVerSesion(nom,ses.id);
    const bDel=document.createElement("button"); bDel.className="btnDel no-print"; bDel.textContent="🗑"; bDel.title="Eliminar sesión";
    bDel.onclick=async ev=>{ ev.stopPropagation();
      if(!await confirmar(`¿Eliminar la sesión del ${formatFecha(ses.fecha)}?`)) return;
      const eq2=cargar(); eq2[nom].sesiones=eq2[nom].sesiones.filter(s=>s.id!==ses.id); guardar(eq2); abrirHistorial(nom);
    };
    row.appendChild(bDel); cont.appendChild(row);
  });
  mostrar("historial");
}

/* ══════════════════════════════════════════
   6) VER SESIÓN
══════════════════════════════════════════ */
function abrirVerSesion(nom,sesId){
  sesionEquipo=nom;
  const eq=cargar(), e=eq[nom]; if(!e) return;
  const ses=e.sesiones.find(s=>s.id===sesId); if(!ses) return;
  const titulo=`${nom} · ${formatFecha(ses.fecha)} ${ses.hora||""}`;
  $("#verSesionTit").textContent=formatFecha(ses.fecha)+" "+ses.hora;
  $("#verSesionSub").textContent=titulo+(ses.nota?" · "+ses.nota:"");
  const cont=$("#verSesionLista"); cont.innerHTML="";
  const presSet=new Set(ses.presentes.map(String));
  const jugs=[...e.jugadoras].sort((a,b)=>(+a.num)-(+b.num));
  jugs.forEach(j=>{
    const pres=presSet.has(String(j.num));
    const row=document.createElement("div"); row.className="sesRow";
    row.innerHTML=`<img class="sAvatar" src="${j.foto||AVATAR}" alt="">
      <div class="sInfo"><div class="sNom">Nº ${j.num} · ${j.nom||""}</div><div class="sSub">${ROLES[j.rol]||j.rol||""}</div></div>
      <span class="${pres?"verPres":"verAus"}">${pres?"✓":"✗"}</span>`;
    cont.appendChild(row);
  });
  const pres=ses.presentes.length, tot=e.jugadoras.length;
  const res=document.createElement("div"); res.style.cssText="text-align:center;padding:10px 0;font-size:13px;color:var(--muted);border-top:1px solid var(--line);margin-top:6px";
  res.textContent=`${pres} presentes · ${tot-pres} ausentes de ${tot}`;
  cont.appendChild(res);
  mostrar("verSesion");
}

/* ── Utilidades ── */
function formatFecha(iso){
  if(!iso) return "";
  const [y,m,d]=iso.split("-");
  return `${d}/${m}/${y}`;
}

/* ══════════════════════════════════════════
   EVENTOS
══════════════════════════════════════════ */
$("#btnNuevoEquipo").onclick=()=>abrirEditor(null);
$("#btnGuardarEquipo").onclick=guardarEditor;
$("#btnBackEditor").onclick=()=>{ renderSelector(); mostrar("sel"); };
$("#btnAddJug").onclick=()=>{ if(!equipoActual||!$("#edNombre").value.trim()){ toast("Guarda el equipo primero"); return; } guardarEditor(); abrirFicha(null); };
$("#btnImportTxt").onclick=()=>$("#importFile").click();
$("#importFile").onchange=e=>{ if(e.target.files[0]) importarTxt(e.target.files[0]); e.target.value=""; };
$("#btnExportEquipo").onclick=exportarEquipoJSON;
$("#btnExportStats").onclick=exportarParaStats;

$("#btnGuardarFicha").onclick=guardarFicha;
$("#btnBackFicha").onclick=()=>mostrar("editor");
$("#fichaFoto").onclick=()=>$("#fichaFotoFile").click();
$("#fichaFotoFile").onchange=e=>{ if(e.target.files[0]) resizarFoto(e.target.files[0],url=>{ $("#fichaFoto").src=url; }); e.target.value=""; };

// Botón eliminar jugadora en ficha
const btnElim=document.createElement("button"); btnElim.className="btnBack no-print"; btnElim.style.cssText="background:var(--rojo);margin-top:4px;width:100%;padding:13px;font-size:15px";
btnElim.textContent="🗑 Eliminar jugadora"; btnElim.onclick=eliminarJugadora;
$("#btnBackFicha").insertAdjacentElement("afterend",btnElim);

$("#btnGuardarSesion").onclick=guardarSesion;
$("#btnBackSesion").onclick=()=>{ renderSelector(); mostrar("sel"); };
$("#btnTodasPresentes").onclick=()=>$$('#sesLista input[type=checkbox]').forEach(c=>c.checked=true);
$("#btnNingunaPresente").onclick=()=>$$('#sesLista input[type=checkbox]').forEach(c=>c.checked=false);
// Actualizar print header cuando cambia fecha/hora
$("#sesFecha").onchange=$("#sesHora").onchange=()=>{
  const f=$("#sesFecha").value, h=$("#sesHora").value;
  $("#sesionPrintHeader").textContent=`${sesionEquipo||""} · ${formatFecha(f)} ${h}`;
};

$("#btnBackHistorial").onclick=()=>{ renderSelector(); mostrar("sel"); };
$("#btnNuevaSesionHist").onclick=()=>abrirSesion(sesionEquipo);
$("#btnBackVerSesion").onclick=()=>abrirHistorial(sesionEquipo);

/* ── Service Worker ── */
if("serviceWorker" in navigator){
  const teniaControl=!!navigator.serviceWorker.controller;
  let recargando=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{ if(recargando)return; recargando=true; if(teniaControl) location.reload(); });
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

/* ── Arranque ── */
renderSelector(); mostrar("sel");
</script>
